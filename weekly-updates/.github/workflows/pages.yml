# 把整个仓库当作纯静态站点部署到 GitHub Pages。
# 不需要构建(没有 Jekyll / 打包),直接上传文件夹。
# 用法:仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"。
# 之后每次 push 到 main 就会自动发布。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # 也可以在 Actions 页面手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .          # 直接上传整个仓库根目录
      - id: deployment
        uses: actions/deploy-pages@v4
